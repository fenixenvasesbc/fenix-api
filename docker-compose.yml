services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix_api
    restart: unless-stopped

    # Carga todas las variables del .env (más simple y evita olvidos)
    env_file:
      - .env

    # Opcional: sobreescribir/asegurar algunas variables (si quieres)
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}

    # Para poder usar host.docker.internal en Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - nginx-proxy-manager-zr1y_default

networks:
  nginx-proxy-manager-zr1y_default:
    external: true