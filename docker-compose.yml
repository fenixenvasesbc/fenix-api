services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix_api
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    depends_on:
      - db
      - rabbitmq
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["pnpm", "start:dev"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix_worker
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    depends_on:
      - db
      - rabbitmq
    volumes:
      - .:/app
      - /app/node_modules
    command: ["pnpm", "start:worker:dev"]

  db:
    image: postgres:16
    container_name: fenix_db
    environment:
      POSTGRES_DB: fenix
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fenix_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fenix
      RABBITMQ_DEFAULT_PASS: fenix
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

volumes:
  pgdata: